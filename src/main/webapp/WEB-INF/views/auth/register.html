<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 400px; margin: 100px auto 0; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <h2 class="text-center mb-4">Đăng ký</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" required />
            </div>
            <div class="mb-3">
                <label>Mật khẩu</label>
                <input type="password" name="password" class="form-control" required />
            </div>
            <div class="mb-3">
                <label>Email liên hệ</label>
                <input type="email" name="email" class="form-control" pattern="[a-zA-Z0-9._%+-]+@gmail\.com" title="Vui lòng nhập định dạng email (VD: ...@gmail.com)" required />
            </div>
            <div class="mb-3">
                <label>Số điện thoại</label>
                <input type="tel" name="phoneNumber" class="form-control" pattern="\d{10,11}" title="Vui lòng nhập 10 hoặc 11 số" required />
            </div>
            <button type="submit" class="btn btn-success w-100">Đăng ký</button>
        </form>
        <div class="mt-3 text-center">
            <a th:href="@{/login}">Đã có tài khoản? Quay lại đăng nhập</a>
        </div>
    </div>
</div>
</body>
</html>
