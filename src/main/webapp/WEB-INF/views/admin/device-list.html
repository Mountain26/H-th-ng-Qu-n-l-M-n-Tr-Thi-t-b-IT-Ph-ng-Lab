<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main-layout :: appHead('Quản lý thiết bị - Admin')}"></head>
<body class="bg-light">

<header th:replace="~{layout/main-layout :: appHeader}"></header>

<div class="container-fluid">
  <div class="row">
    <aside th:replace="~{layout/main-layout :: adminSidebar('devices')}"></aside>

    <main class="col-md-9 col-lg-10 p-4">
      <div th:replace="~{layout/main-layout :: flashMessage}"></div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Quản lý thiết bị và phòng lab</h4>
        <a class="btn btn-primary" th:href="@{/admin/devices/create}">+ Thêm mới</a>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-striped align-middle mb-0">
              <thead class="table-dark">
              <tr>
                <th class="ps-3">ID</th>
                <th>Tên thiết bị</th>
                <th>Ảnh</th>
                <th>Số lượng</th>
                <th class="text-end pe-3">Tùy chỉnh</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="device : ${devices}">
                <td class="ps-3" th:text="${device.id}">1</td>
                <td th:text="${device.name}">Device</td>
                <td>
                  <img th:src="${device.image}" alt="device" style="width: 64px; height: 40px; object-fit: cover;">
                </td>
                <td>
                  <span class="badge" th:classappend="${device.quantity > 0} ? ' bg-success' : ' bg-danger'"
                        th:text="${device.quantity}">0</span>
                </td>
                <td class="text-end pe-3">
                  <a class="btn btn-sm btn-outline-secondary" th:href="@{'/admin/devices/edit/' + ${device.id}}">Sửa</a>
                  <form th:action="@{'/admin/devices/delete/' + ${device.id}}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Xóa</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(devices)}">
                <td colspan="5" class="text-center text-muted py-3">Chưa có thiết bị</td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<footer th:replace="~{layout/main-layout :: appFooter}"></footer>

</body>
</html>
