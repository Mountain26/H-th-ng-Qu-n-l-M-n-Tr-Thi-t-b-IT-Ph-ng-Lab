<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main-layout :: appHead('Danh sách yêu cầu - Admin')}"></head>
<body class="bg-light">

<header th:replace="~{layout/main-layout :: appHeader}"></header>

<div class="container-fluid">
    <div class="row">
        <aside th:replace="~{layout/main-layout :: adminSidebar('requests')}"></aside>

        <main class="col-md-9 col-lg-10 p-4">
            <div th:replace="~{layout/main-layout :: flashMessage}"></div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Danh sách yêu cầu mượn</h4>
                <span class="text-muted">Tổng yêu cầu: <strong th:text="${#lists.size(borrowRequests)}">0</strong></span>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-3">Mã SV</th>
                                <th>Họ tên</th>
                                <th>Thiết bị</th>
                                <th>SL</th>
                                <th>Ngày mượn</th>
                                <th>Ngày trả</th>
                                <th>Lý do</th>
                                <th>Trạng thái</th>
                                <th class="text-end pe-3">Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="request : ${borrowRequests}">
                                <td class="ps-3" th:text="${request.studentCode}">SV001</td>
                                <td th:text="${request.studentName}">Name</td>
                                <td th:text="${request.device != null ? request.device.name : '-'}">Device</td>
                                <td th:text="${request.quantity}">1</td>
                                <td th:text="${request.borrowDate}">2026-01-01</td>
                                <td th:text="${request.returnDate}">2026-01-02</td>
                                <td th:text="${request.reason}">Reason</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${request.status == 'APPROVED'} ? ' bg-success' : (${request.status == 'REJECTED'} ? ' bg-danger' : ' bg-warning text-dark')"
                                          th:text="${request.status == 'APPROVED'} ? 'Đã duyệt' : (${request.status == 'REJECTED'} ? 'Đã từ chối' : 'Chờ duyệt')">
                                        Chờ duyệt
                                    </span>
                                </td>
                                <td class="text-end pe-3">
                                    <div th:if="${request.status == 'PENDING'}" class="d-flex justify-content-end gap-1">
                                        <form th:action="@{'/admin/requests/' + ${request.id} + '/approve'}" method="post">
                                            <button type="submit" class="btn btn-sm btn-success">Duyệt</button>
                                        </form>
                                        <form th:action="@{'/admin/requests/' + ${request.id} + '/reject'}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Từ chối</button>
                                        </form>
                                    </div>
                                    <span th:if="${request.status != 'PENDING'}" class="text-muted small">Đã xử lý</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(borrowRequests)}">
                                <td colspan="9" class="text-center text-muted py-3">Chưa có yêu cầu nào</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<footer th:replace="~{layout/main-layout :: appFooter}"></footer>

</body>
</html>
