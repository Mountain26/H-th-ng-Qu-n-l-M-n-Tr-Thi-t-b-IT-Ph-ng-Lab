<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="appHead(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Cổng quản lý mượn trả</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header th:fragment="appHeader" class="border-bottom bg-white shadow-sm">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" th:href="@{/student/devices}">IT Lab Portal</a>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary btn-sm" th:href="@{/student/devices}">Sinh viên</a>
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/dashboard}">Admin</a>
            </div>
        </div>
    </nav>
</header>

<div th:fragment="flashMessage" class="container mt-3">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">Đăng ký thành công.</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<aside th:fragment="adminSidebar(activeMenu)" class="col-md-3 col-lg-2 p-0 bg-white shadow-sm min-vh-100">
    <div class="p-3 border-bottom text-center">
        <span class="badge bg-danger mb-2">ADMIN</span><br>
        <span class="fw-bold text-primary">Hệ thống quản trị</span>
    </div>
    <ul class="nav flex-column py-2">
        <li class="nav-item">
            <a th:href="@{/admin/dashboard}"
               class="nav-link px-3 py-2"
               th:classappend="${activeMenu == 'dashboard'} ? ' text-primary fw-bold bg-light border-end border-primary border-3' : ' text-dark'">
                Tổng quan
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/devices}"
               class="nav-link px-3 py-2"
               th:classappend="${activeMenu == 'devices'} ? ' text-primary fw-bold bg-light border-end border-primary border-3' : ' text-dark'">
                Quản lý thiết bị/Lab
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/requests}"
               class="nav-link px-3 py-2"
               th:classappend="${activeMenu == 'requests'} ? ' text-primary fw-bold bg-light border-end border-primary border-3' : ' text-dark'">
                Yêu cầu mượn
            </a>
        </li>
    </ul>
</aside>

<footer th:fragment="appFooter" class="border-top bg-white mt-5">
    <div class="container py-3 text-center text-muted small">
        Hệ thống quản lý mượn/trả thiết bị IT và phòng Lab
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</footer>
</body>
</html>
