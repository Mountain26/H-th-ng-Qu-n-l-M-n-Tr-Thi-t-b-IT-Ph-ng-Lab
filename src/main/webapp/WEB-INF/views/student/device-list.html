<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Thiết Bị</title>
    <!-- Thêm Bootstrap 5 cho đẹp -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .device-card img {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col text-center">
            <h2 class="text-primary fw-bold">Danh sách Thiết Bị Sinh Viên</h2>
            <p class="text-muted">Lựa chọn thiết bị muốn mượn cho bài thực hành</p>
        </div>
    </div>

    <!-- Thông báo thành công (nếu chuyển từ redirect param ?success) -->
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <strong>Thành công!</strong> Đăng ký mượn thiết bị đã được gửi.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Lưới hiên thị Thiết bị -->
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">

        <!-- Vòng lặp Thymeleaf gọi đến list devices truyền từ StudentController -->
        <div class="col" th:each="device : ${devices}">
            <div class="card h-100 shadow-sm device-card border-0">
                <!-- Vị trí truyền URL ảnh hoặc Placeholder -->
                <img th:src="${device.image != null and !device.image.isEmpty() ? device.image : 'https://via.placeholder.com/200x200?text=IMG'}"
                     class="card-img-top" th:alt="${device.name}">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${device.name}">Tên Máy</h5>
                    <div class="text-muted small mb-2">
                        Mã TB: <strong th:text="'#' + ${device.id}">#1</strong>
                    </div>

                    <p class="card-text mb-4">
                        Số lượng còn:
                        <span class="badge"
                              th:classappend="${device.quantity > 0} ? 'bg-success' : 'bg-danger'"
                              th:text="${device.quantity > 0 ? device.quantity : 'Hết hàng'}">
                            10
                        </span>
                    </p>

                    <!-- Nút Mượn (truyền ID thiết bị lên path URL) -->
                    <a th:href="@{'/student/borrow/' + ${device.id}}"
                       class="btn btn-primary w-100 mt-auto"
                       th:classappend="${device.quantity <= 0} ? 'disabled' : ''">
                       Đăng ký mượn
                    </a>
                </div>
            </div>
        </div>

    </div>

    <!-- Trường hợp trống nếu List không có -->
    <div th:if="${#lists.isEmpty(devices)}" class="alert alert-warning text-center mt-4">
        Hiện tại khoa không có thiết bị nào.
    </div>

</div>

<!-- Script của Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
